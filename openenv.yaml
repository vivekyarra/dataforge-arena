# DataForge Arena — OpenEnv Configuration
# https://huggingface.co/docs/openenv

name: dataforge-arena
version: "1.0.0"
description: >
  DataForge Arena: an OpenEnv benchmark training autonomous data cleaning agents
  to maintain causal world models of structured enterprise data. The agent reasons
  about schema types, value ranges, FK constraints, and statistical distributions
  to select and justify repairs. Reward is grounded in ground-truth accuracy delta —
  no LLM judge, no human annotation.

# Environment interface
env:
  module: environment.env
  class: DataForgeEnv
  observation_type: structured
  action_type: structured

# Server configuration
server:
  module: environment.server
  framework: fastapi
  port: 7860
  endpoints:
    health: /health
    info: /info
    reset: /reset
    step: /step
    docs: /docs

# Deployment
deployment:
  sdk: docker
  dockerfile: Dockerfile
  app_port: 7860

# Task definition
task:
  name: tabular-data-repair
  description: >
    Observe a corrupted tabular dataset, identify the causal violation type
    (range, null, FK, enum, temporal, statistical outlier), select the appropriate
    repair tool, target the correct cell, and improve data quality as measured by
    accuracy delta against ground truth. The agent must maintain a causal world model
    of schema constraints to earn alignment rewards.
  max_steps: 5
  difficulty_tiers: [1, 2, 3]

# Reward specification
reward:
  primary_signal: accuracy_delta
  shaping_terms:
    - constraint_alignment      # Did agent correctly identify the violation type? (+3.0)
    - schema_alignment          # Did agent select the right tool for the column type? (+2.0)
    - outlier_targeting         # Did agent target a genuine statistical outlier (z > 3σ)? (+0.5)
    - reasoning_quality         # Does reasoning reference column name + violation type? (+1.5)
    - parse_bonus               # Clean, valid JSON output with reasoning > 10 chars (+0.5)
    - anti_hack                 # Prevents mass-deletion reward hacking (−5.0)
  range: [-5.0, 8.0]

# Schemas
schemas:
  - name: healthcare
    file: environment/schemas.py
    columns: 7
  - name: financial
    file: environment/schemas.py
    columns: 7

# Corruption taxonomy
corruption:
  tier_1:
    - null_injection
    - type_mismatch
    - range_violation
    - enum_violation
  tier_2:
    - fk_mismatch
    - semantic_temporal_drift
    - currency_amount_inconsistency
  escalation: rolling_avg_reward_gate_with_step_gate_and_deescalation

# Training
training:
  algorithm: GRPO
  framework: TRL
  base_models:
    - unsloth/Qwen2.5-1.5B-Instruct-bnb-4bit
    - unsloth/Llama-3.2-3B-Instruct-bnb-4bit
    - unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit
  temperature_schedule:
    start: 0.8
    end: 0.2
    decay_steps: 200

# Evaluation
evaluation:
  agent_modes: [heuristic, grpo, random]
  default_episodes: 20
  default_seed: 7
  metrics:
    - surgeon_avg_accuracy_delta
    - random_avg_accuracy_delta
    - surgeon_advantage_accuracy_delta
    - surgeon_win_rate
    - destruction_ratio
    - improvement_vs_random_pct
    - constraint_alignment_rate
    - schema_alignment_rate

# Metadata
metadata:
  authors: [Vivek567]
  license: MIT
  hackathon: "Meta x PyTorch x Hugging Face x Scaler OpenEnv Hackathon 2026"
  theme: "3.1 World Modeling / Professional Tasks — Causal Schema Reasoning Agent"
  repository: https://github.com/vivekyarra/dataforge-arena
  space: https://huggingface.co/spaces/Vivek567/dataforge-arena
