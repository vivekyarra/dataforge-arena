  <text x="365" y="478" text-anchor="middle" fill="#8b5cf6" font-size="10">Qwen 2.5  1.5B</text>
  <text x="365" y="496" text-anchor="middle" fill="#6d28d9" font-size="10">4-bit LoRA  r=16</text>

  <!-- A10G -->
  <rect x="580" y="428" width="280" height="140" rx="6" fill="#0f0a2a" stroke="#3a1f6a" stroke-width="1"/>
  <text x="720" y="450" text-anchor="middle" fill="#c4b5fd" font-size="10">A10G / L40S</text>
  <text x="720" y="478" text-anchor="middle" fill="#8b5cf6" font-size="10">Llama 3.2  3B</text>
  <text x="720" y="496" text-anchor="middle" fill="#6d28d9" font-size="10">4-bit LoRA  r=16</text>

  <!-- A100/H100 -->
  <rect x="935" y="428" width="280" height="140" rx="6" fill="#0f0a2a" stroke="#3a1f6a" stroke-width="1"/>
  <text x="1075" y="450" text-anchor="middle" fill="#c4b5fd" font-size="10">A100 / H100</text>
  <text x="1075" y="478" text-anchor="middle" fill="#8b5cf6" font-size="10">Llama 3.1  8B</text>
  <text x="1075" y="496" text-anchor="middle" fill="#6d28d9" font-size="10">bf16 LoRA  r=16</text>

  <!-- Sub-box footer -->
  <line x1="220" y1="574" x2="1220" y2="574" stroke="#2a1a5a" stroke-width="1"/>
  <text x="720" y="589" text-anchor="middle" fill="#4b5563" font-size="10">Unsloth 4-bit  ·  TRL GRPOTrainer  ·  LoRA r=16 alpha=16  ·  Temp 0.8 → 0.2  ·  Auto GPU detect</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- VERTICAL ARROWS: GRPO ↓ to bottom row -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- policy update: single arrow all the way to FastAPI box — no stacking -->
  <line x1="720" y1="588" x2="720" y2="630" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="728" y="601" fill="#a78bfa" font-size="9">policy update</text>

  <!-- teal arrows to Gradio (left) and Docker (right) only; centre handled above -->
  <line x1="365" y1="588" x2="248" y2="630" stroke="#2dd4bf" stroke-width="1.2" marker-end="url(#arr-teal)"/>
  <line x1="1075" y1="588" x2="1192" y2="630" stroke="#2dd4bf" stroke-width="1.2" marker-end="url(#arr-teal)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3: Bottom three boxes -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Gradio Demo -->
  <rect x="28" y="630" width="400" height="110" rx="8" fill="#0a2a2a" stroke="#0a4a4a" stroke-width="1.5"/>
  <text x="228" y="655" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="bold">Gradio Demo</text>
  <text x="228" y="678" text-anchor="middle" fill="#475569" font-size="10">4 tabs · 3 agent modes</text>
  <text x="228" y="696" text-anchor="middle" fill="#475569" font-size="10">2188-line production app</text>

  <!-- FastAPI OpenEnv -->
  <rect x="520" y="630" width="400" height="110" rx="8" fill="#0a1a2a" stroke="#0a2a4a" stroke-width="1.5"/>
  <text x="720" y="655" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="bold">FastAPI OpenEnv</text>
  <text x="720" y="678" text-anchor="middle" fill="#475569" font-size="10">/reset  /step  /metrics</text>
  <text x="720" y="696" text-anchor="middle" fill="#475569" font-size="10">OpenEnv-compliant server</text>

  <!-- Docker + CI/CD -->
  <rect x="1012" y="630" width="400" height="110" rx="8" fill="#0a1a2a" stroke="#0a2a4a" stroke-width="1.5"/>
  <text x="1212" y="655" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Docker + CI/CD</text>
  <text x="1212" y="678" text-anchor="middle" fill="#475569" font-size="10">GitHub Actions auto-sync</text>
  <text x="1212" y="696" text-anchor="middle" fill="#475569" font-size="10">to HF Space on every push</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STATS BAR -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="28" y="756" width="262" height="40" rx="6" fill="#0f3a1a" stroke="#1a5a2a" stroke-width="1"/>
  <text x="159" y="781" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">+132% reward (300 steps)</text>

  <rect x="302" y="756" width="262" height="40" rx="6" fill="#0a2a2a" stroke="#0a4a4a" stroke-width="1"/>
  <text x="433" y="781" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="bold">9.8x safer than random</text>

  <rect x="576" y="756" width="288" height="40" rx="6" fill="#0a2a3a" stroke="#0a4a6a" stroke-width="1"/>
  <text x="720" y="781" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="bold">100% JSON parse success</text>

  <rect x="876" y="756" width="262" height="40" rx="6" fill="#1a0a3a" stroke="#3a0a6a" stroke-width="1"/>
  <text x="1007" y="781" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">127 tests passing</text>

  <rect x="1150" y="756" width="262" height="40" rx="6" fill="#2a1a0a" stroke="#5a3a0a" stroke-width="1"/>
  <text x="1281" y="781" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Peak reward +8.25</text>
</svg>
