<svg viewBox="0 0 1440 820" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2dd4bf"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1440" height="820" fill="#0d1117"/>

  <!-- Title -->
  <text x="720" y="38" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold" letter-spacing="1">DataForge Arena  —  System Architecture</text>
  <text x="720" y="60" text-anchor="middle" fill="#64748b" font-size="12" letter-spacing="2">Adaptive adversary · Ground-truth reward · No LLM judge · OpenEnv compliant</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1: Three top boxes -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- LEFT: ADAPTIVE CORRUPTOR -->
  <rect x="28" y="78" width="370" height="265" rx="8" fill="#1a1a0a" stroke="#78650a" stroke-width="1.5"/>
  <text x="204" y="101" text-anchor="middle" fill="#d4a017" font-size="11" font-weight="bold" letter-spacing="3">ADAPTIVE CORRUPTOR</text>

  <!-- Tier pills -->
  <rect x="50" y="114" width="326" height="36" rx="6" fill="#2a3a1a" stroke="#4a6a2a" stroke-width="1"/>
  <rect x="58" y="121" width="55" height="20" rx="3" fill="#1a3a1a"/>
  <text x="85" y="135" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Tier 1</text>
  <text x="122" y="135" fill="#86efac" font-size="10">GREEN</text>
  <text x="180" y="135" fill="#6b7280" font-size="10">nulls · type errors · enum swap</text>

  <rect x="50" y="156" width="326" height="36" rx="6" fill="#3a2a0a" stroke="#6a4a0a" stroke-width="1"/>
  <rect x="58" y="163" width="55" height="20" rx="3" fill="#3a2a0a"/>
  <text x="85" y="177" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">Tier 2</text>
  <text x="122" y="177" fill="#fcd34d" font-size="10">AMBER</text>
  <text x="180" y="177" fill="#6b7280" font-size="10">temporal drift · FK · currency</text>

  <rect x="50" y="198" width="326" height="36" rx="6" fill="#3a1a1a" stroke="#6a2a2a" stroke-width="1"/>
  <rect x="58" y="205" width="55" height="20" rx="3" fill="#3a1a1a"/>
  <text x="85" y="219" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold">Tier 3</text>
  <text x="122" y="219" fill="#fca5a5" font-size="10">RED</text>
  <text x="180" y="219" fill="#6b7280" font-size="10">FK breaks · mutated duplicates</text>

  <line x1="50" y1="248" x2="376" y2="248" stroke="#2a2a1a" stroke-width="1"/>
  <text x="204" y="268" text-anchor="middle" fill="#4b5563" font-size="10">Solvability gate: 3 types banned</text>
  <text x="204" y="285" text-anchor="middle" fill="#4b5563" font-size="10">Every episode has a ground truth</text>

  <!-- CENTER: OPENENV ENVIRONMENT -->
  <rect x="430" y="78" width="580" height="265" rx="8" fill="#0f1e3a" stroke="#1e3a6a" stroke-width="1.5"/>
  <text x="720" y="101" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold" letter-spacing="3">OpenEnv ENVIRONMENT</text>

  <!-- Observation fields -->
  <g font-size="10">
    <text x="470" y="128" fill="#38bdf8" font-weight="bold">rows_json</text>
    <text x="730" y="128" fill="#475569">top-4 rows ranked by corruption severity</text>

    <text x="470" y="152" fill="#38bdf8" font-weight="bold">schema_str</text>
    <text x="730" y="152" fill="#475569">col types · nullability · enums · ranges</text>

    <text x="470" y="176" fill="#38bdf8" font-weight="bold">violation_type</text>
    <text x="730" y="176" fill="#475569">pre-detected violation class (top suspect)</text>

    <text x="470" y="200" fill="#38bdf8" font-weight="bold">target_cell_hint</text>
    <text x="730" y="200" fill="#475569">row · col · value · z-score surface</text>

    <text x="470" y="224" fill="#38bdf8" font-weight="bold">action_history</text>
    <text x="730" y="224" fill="#475569">last 2 actions – discourages repeat loops</text>
  </g>

  <line x1="450" y1="240" x2="990" y2="240" stroke="#1e3a6a" stroke-width="1"/>
  <text x="560" y="258" fill="#475569" font-size="10">reset() / step() · 20-step episode horizon</text>

  <!-- RIGHT: REWARD COMPUTER -->
  <rect x="1042" y="78" width="370" height="265" rx="8" fill="#0a1a1a" stroke="#0a4a3a" stroke-width="1.5"/>
  <text x="1227" y="101" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="bold" letter-spacing="3">REWARD COMPUTER</text>

  <!-- Reward lines -->
  <g font-size="10">
    <text x="1060" y="128" fill="#2dd4bf" font-weight="bold">accuracy_delta × 50</text>
    <text x="1240" y="128" fill="#475569">↑primary  ground truth delta</text>

    <text x="1060" y="152" fill="#34d399" font-weight="bold">constraint_align</text>
    <text x="1240" y="152" fill="#475569">+3.0  violation class correct</text>

    <text x="1060" y="176" fill="#34d399" font-weight="bold">schema_alignment</text>
    <text x="1240" y="176" fill="#475569">+2.0  tool matches col type</text>

    <text x="1060" y="200" fill="#34d399" font-weight="bold">reasoning_quality</text>
    <text x="1240" y="200" fill="#475569">+1.5  causal coherence score</text>

    <text x="1060" y="224" fill="#f87171" font-weight="bold">anti_hack</text>
    <text x="1240" y="224" fill="#475569">−5.0  exploit patterns caught</text>
  </g>

  <line x1="1060" y1="240" x2="1395" y2="240" stroke="#0a4a3a" stroke-width="1"/>
  <text x="1227" y="258" text-anchor="middle" fill="#475569" font-size="10">range  [ −5.0 ,  +8.0 ]  ·  no LLM judge</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: Row 1 horizontal — labels on masked pill above boxes -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Corruptor → OpenEnv: full arrow line -->
  <line x1="398" y1="210" x2="428" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <!-- Label sits ABOVE the top box boundary (y=78), no overlap possible -->
  <rect x="356" y="66" width="116" height="16" rx="3" fill="#0d1117"/>
  <text x="414" y="78" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold">inject corruption →</text>

  <!-- OpenEnv → Reward: full arrow line -->
  <line x1="1010" y1="210" x2="1040" y2="210" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- Label sits ABOVE the top box boundary (y=78), no overlap possible -->
  <rect x="974" y="66" width="104" height="16" rx="3" fill="#0d1117"/>
  <text x="1026" y="78" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">→ ground truth</text>

