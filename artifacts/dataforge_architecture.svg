  <line x1="204" y1="343" x2="204" y2="393" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="213" y="372" fill="#f59e0b" font-size="9">rolling reward gate</text>

  <!-- Reward → GRPO (down, blue) -->
  <line x1="1227" y1="343" x2="1227" y2="393" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="1236" y="372" fill="#60a5fa" font-size="9">reward signal</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 2: GRPO TRAINING BOX -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="200" y="393" width="1040" height="195" rx="8" fill="#1a0f3a" stroke="#3a1f7a" stroke-width="1.5"/>
  <text x="720" y="416" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold" letter-spacing="3">GRPO TRAINING  —  DataSurgeon Agent</text>

